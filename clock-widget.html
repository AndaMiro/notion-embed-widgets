<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">

  <style>
    :root {
      color-scheme: light dark;
      --text: #262626;
      --muted: rgba(38, 38, 38, 0.46);
      --line: rgba(38, 38, 38, 0.22);
      --segment-off: rgba(38, 38, 38, 0.055);
      --red: #c9302c;
      --red-muted: rgba(201, 48, 44, 0.25);
      --time-scale: 1;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text: rgba(255, 255, 255, 0.88);
        --muted: rgba(255, 255, 255, 0.42);
        --line: rgba(255, 255, 255, 0.2);
        --segment-off: rgba(255, 255, 255, 0.055);
        --red: #ff453f;
        --red-muted: rgba(255, 69, 63, 0.26);
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      font-family: "Arial Narrow", Arial, sans-serif;
    }

    .widget {
      display: grid;
      width: 100%;
      height: 100%;
      min-height: 0;
      grid-template-rows:
        clamp(24px, 16%, 36px)
        minmax(0, 1fr)
        clamp(28px, 18%, 42px);
      overflow: hidden;
      color: var(--text);
      border: 1px solid var(--line);
      background: transparent;
    }

    .header {
      display: flex;
      min-width: 0;
      min-height: 0;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 clamp(8px, 2.5vw, 16px);
      overflow: hidden;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: clamp(7px, 1.9vw, 11px);
      font-weight: 800;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .header-left,
    .header-right {
      display: flex;
      min-width: 0;
      align-items: center;
      gap: clamp(5px, 1.4vw, 9px);
      overflow: hidden;
    }

    .header-right {
      flex: 0 1 auto;
      justify-content: flex-end;
    }

    .date-label {
      flex: 0 0 auto;
      color: var(--text);
      font-size: clamp(8px, 2vw, 12px);
    }

    .signal {
      width: clamp(4px, 1.3vw, 7px);
      height: clamp(4px, 1.3vw, 7px);
      flex: 0 0 auto;
      background: var(--red);
    }

    .signal.off {
      opacity: 0.25;
    }

    .content {
      display: grid;
      min-width: 0;
      min-height: 0;
      grid-template-columns: minmax(0, 1fr) clamp(88px, 30vw, 190px);
    }

    .clock-area {
      display: flex;
      min-width: 0;
      min-height: 0;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: clamp(3px, 1.8vw, 10px);
    }

    .time {
      display: flex;
      max-width: 100%;
      max-height: 100%;
      align-items: center;
      justify-content: center;
      gap: calc(12px * var(--time-scale));
      transform: skewX(-2deg);
      transform-origin: center;
    }

    .digit-group {
      display: flex;
      gap: calc(8px * var(--time-scale));
      flex: 0 0 auto;
    }

    .digit {
      --width: calc(68px * var(--time-scale));
      --height: calc(118px * var(--time-scale));
      --thickness: calc(10px * var(--time-scale));

      position: relative;
      width: var(--width);
      height: var(--height);
      flex: 0 0 auto;
    }

    .segment {
      position: absolute;
      background: var(--segment-off);
    }

    .segment.active {
      background: var(--text);
    }

    .segment.horizontal {
      left: var(--thickness);
      width: calc(100% - var(--thickness) * 2);
      height: var(--thickness);
      clip-path: polygon(
        10% 0,
        90% 0,
        100% 50%,
        90% 100%,
        10% 100%,
        0 50%
      );
    }

    .segment.vertical {
      width: var(--thickness);
      height: 42%;
      clip-path: polygon(
        50% 0,
        100% 10%,
        100% 90%,
        50% 100%,
        0 90%,
        0 10%
      );
    }

    .a { top: 0; }
    .g { top: 50%; transform: translateY(-50%); }
    .d { bottom: 0; }
    .f { top: 6%; left: 0; }
    .b { top: 6%; right: 0; }
    .e { bottom: 6%; left: 0; }
    .c { right: 0; bottom: 6%; }

    .colon {
      display: flex;
      width: calc(13px * var(--time-scale));
      height: calc(64px * var(--time-scale));
      flex: 0 0 auto;
      flex-direction: column;
      justify-content: space-between;
      opacity: 1;
    }

    .colon.off {
      opacity: 0.18;
    }

    .colon span {
      width: calc(10px * var(--time-scale));
      height: calc(15px * var(--time-scale));
      background: var(--text);
      clip-path: polygon(25% 0, 100% 20%, 75% 100%, 0 80%);
    }

    .status-area {
      display: grid;
      min-width: 0;
      min-height: 0;
      grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
      gap: clamp(4px, 1.8vw, 10px);
      padding: clamp(4px, 1.8vw, 11px);
      border-left: 1px solid var(--line);
      overflow: hidden;
    }

    .status-box {
      display: grid;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      grid-template-columns: minmax(0, 1fr) clamp(14px, 7vw, 46px);
      border: 1px solid var(--red);
    }

    .status-copy {
      display: flex;
      min-width: 0;
      min-height: 0;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
      padding-left: clamp(4px, 1.8vw, 10px);
      color: var(--red);
    }

    .status-copy strong {
      display: block;
      overflow: hidden;
      font-family: serif;
      font-size: clamp(14px, 6vw, 27px);
      line-height: 0.9;
      white-space: nowrap;
    }

    .status-copy span {
      display: block;
      margin-top: clamp(2px, 1vw, 5px);
      overflow: hidden;
      font-size: clamp(7px, 2.5vw, 11px);
      font-weight: 900;
      white-space: nowrap;
    }

    .stripes {
      min-width: 0;
      border-left: 1px solid var(--red);
      background:
        repeating-linear-gradient(
          130deg,
          var(--red) 0,
          var(--red) 7px,
          transparent 7px,
          transparent 13px
        );
    }

    .status-box.external {
      border-color: var(--red-muted);
    }

    .status-box.external .status-copy {
      color: var(--red-muted);
    }

    .status-box.external .stripes {
      border-color: var(--red-muted);
      opacity: 0.35;
    }

    .footer {
      display: grid;
      min-height: 0;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid var(--line);
      overflow: hidden;
    }

    .mode {
      position: relative;
      display: flex;
      min-width: 0;
      min-height: 0;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-right: 1px solid var(--line);
      color: var(--muted);
      font-size: clamp(7px, 2vw, 11px);
      font-weight: 800;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .mode:last-child {
      border-right: 0;
    }

    .mode.active {
      padding-bottom: clamp(5px, 1.6vw, 8px);
      color: var(--text);
    }

    .mode.active::after {
      position: absolute;
      right: 26%;
      bottom: clamp(2px, 1vw, 4px);
      left: 26%;
      height: clamp(3px, 1.2vw, 5px);
      content: "";
      background: var(--red);
    }

    @media (max-width: 360px) {
      .header-left > span:last-child {
        display: none;
      }

      .content {
        grid-template-columns: minmax(0, 1fr) clamp(76px, 34vw, 118px);
      }

      .status-copy span {
        font-size: clamp(6px, 2.4vw, 8px);
      }
    }

    @media (max-width: 260px) {
      .date-label {
        display: none;
      }

      .status-copy span {
        display: none;
      }

      .content {
        grid-template-columns: minmax(0, 1fr) clamp(68px, 35vw, 92px);
      }
    }

    .widget.numbers-only {
      display: flex;
      align-items: center;
      justify-content: center;
      border: 0;
    }

    .widget.numbers-only .header,
    .widget.numbers-only .status-area,
    .widget.numbers-only .footer {
      display: none;
    }

    .widget.numbers-only .content {
      display: block;
      width: 100%;
      height: 100%;
    }

    .widget.numbers-only .clock-area {
      width: 100%;
      height: 100%;
      padding: 0;
    }
  </style>
</head>

<body>
  <main class="widget" id="widget" aria-label="대한민국 서울 현재 시각">
    <header class="header">
      <div class="header-left">
        <span class="signal" id="signal"></span>
        <span>Active Time · Seoul</span>
      </div>

      <div class="header-right">
        <span class="date-label" id="dateLabel">0000.00.00</span>
        <span>Korea Standard Time</span>
      </div>
    </header>

    <section class="content">
      <div class="clock-area" id="clockArea">
        <div class="time" id="time">
          <div class="digit-group">
            <div class="digit"></div>
            <div class="digit"></div>
          </div>

          <div class="colon" id="colon">
            <span></span>
            <span></span>
          </div>

          <div class="digit-group">
            <div class="digit"></div>
            <div class="digit"></div>
          </div>
        </div>
      </div>

      <aside class="status-area">
        <div class="status-box">
          <div class="status-copy">
            <strong>内部</strong>
            <span>INTERNAL</span>
          </div>

          <div class="stripes"></div>
        </div>

        <div class="status-box external">
          <div class="status-copy">
            <strong>外部</strong>
            <span>EXTERNAL</span>
          </div>

          <div class="stripes"></div>
        </div>
      </aside>
    </section>

    <footer class="footer">
      <span class="mode">Stop</span>
      <span class="mode">Slow</span>
      <span class="mode">Normal</span>
      <span class="mode active">Racing</span>
    </footer>
  </main>

  <script>
    const names = ["a", "b", "c", "d", "e", "f", "g"];

    const widget = document.getElementById("widget");
    const clockArea = document.getElementById("clockArea");
    const dateLabel = document.getElementById("dateLabel");
    const colon = document.getElementById("colon");
    const signal = document.getElementById("signal");

    const digitSegments = {
      0: ["a", "b", "c", "d", "e", "f"],
      1: ["b", "c"],
      2: ["a", "b", "d", "e", "g"],
      3: ["a", "b", "c", "d", "g"],
      4: ["b", "c", "f", "g"],
      5: ["a", "c", "d", "f", "g"],
      6: ["a", "c", "d", "e", "f", "g"],
      7: ["a", "b", "c"],
      8: ["a", "b", "c", "d", "e", "f", "g"],
      9: ["a", "b", "c", "d", "f", "g"]
    };

    const digits = [...document.querySelectorAll(".digit")];

    digits.forEach(digit => {
      names.forEach(name => {
        const segment = document.createElement("span");
        const orientation = ["a", "d", "g"].includes(name)
          ? "horizontal"
          : "vertical";

        segment.className = `segment ${orientation} ${name}`;
        digit.appendChild(segment);
      });
    });

    const formatter = new Intl.DateTimeFormat("en-GB", {
      timeZone: "Asia/Seoul",
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      hourCycle: "h23"
    });

    function setDigit(element, value) {
      const active = digitSegments[value];

      names.forEach(name => {
        element
          .querySelector(`.${name}`)
          .classList.toggle("active", active.includes(name));
      });
    }

    function getInnerSize(element) {
      const rect = element.getBoundingClientRect();
      const style = getComputedStyle(element);

      const paddingX =
        parseFloat(style.paddingLeft) +
        parseFloat(style.paddingRight);

      const paddingY =
        parseFloat(style.paddingTop) +
        parseFloat(style.paddingBottom);

      return {
        width: Math.max(1, rect.width - paddingX),
        height: Math.max(1, rect.height - paddingY)
      };
    }

    function fitTime() {
      const widgetRect = widget.getBoundingClientRect();

      const shouldUseNumbersOnly =
        widgetRect.width < 145 ||
        widgetRect.height < 76;

      widget.classList.toggle("numbers-only", shouldUseNumbersOnly);

      requestAnimationFrame(() => {
        const area = getInnerSize(clockArea);

        /*
          기본 시간 표시 크기:
          digit 4개 = 68 * 4
          digit-group 내부 gap 2개 = 8 * 2
          colon = 13
          time gap 2개 = 12 * 2
          skew 보정 여유 = 약 10
        */
        const baseWidth = 335;
        const baseHeight = 118;

        const scale = Math.min(
          1,
          area.width / baseWidth,
          area.height / baseHeight
        );

        document.documentElement.style.setProperty(
          "--time-scale",
          Math.max(0.12, scale).toFixed(3)
        );
      });
    }

    function updateClock() {
      const parts = Object.fromEntries(
        formatter
          .formatToParts(new Date())
          .filter(part => part.type !== "literal")
          .map(part => [part.type, part.value])
      );

      const time = `${parts.hour}${parts.minute}`;
      const blinkOff = Number(parts.second) % 2 === 1;

      digits.forEach((digit, index) => {
        setDigit(digit, time[index]);
      });

      colon.classList.toggle("off", blinkOff);
      signal.classList.toggle("off", blinkOff);

      dateLabel.textContent = `${parts.year}.${parts.month}.${parts.day}`;

      fitTime();
    }

    const observer = new ResizeObserver(fitTime);

    observer.observe(document.documentElement);
    observer.observe(document.body);
    observer.observe(widget);
    observer.observe(clockArea);

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", fitTime);
    }

    window.addEventListener("resize", fitTime);

    updateClock();
    fitTime();

    setTimeout(fitTime, 50);
    setTimeout(fitTime, 300);
    setTimeout(fitTime, 1000);

    setInterval(updateClock, 250);
  </script>
</body>
</html>
