<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">

  <style>
    :root {
      color-scheme: light dark;
      --text: #262626;
      --muted: rgba(38, 38, 38, 0.46);
      --line: rgba(38, 38, 38, 0.22);
      --segment-off: rgba(38, 38, 38, 0.055);
      --red: #c9302c;
      --red-muted: rgba(201, 48, 44, 0.25);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text: rgba(255, 255, 255, 0.88);
        --muted: rgba(255, 255, 255, 0.42);
        --line: rgba(255, 255, 255, 0.2);
        --segment-off: rgba(255, 255, 255, 0.055);
        --red: #ff453f;
        --red-muted: rgba(255, 69, 63, 0.26);
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 210px;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-family: "Arial Narrow", Arial, sans-serif;
    }

    .widget {
      display: grid;
      width: 100%;
      height: 210px;
      grid-template-rows: 31px minmax(0, 1fr) 36px;
      overflow: hidden;
      color: var(--text);
      border: 1px solid var(--line);
      background: transparent;
    }

    .header {
      display: flex;
      min-width: 0;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 14px;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .header-left,
    .header-right {
      display: flex;
      min-width: 0;
      align-items: center;
      gap: 8px;
    }

    .header-right {
      flex: 0 1 auto;
      justify-content: flex-end;
    }

    .date-label {
      color: var(--text);
    }

    .signal {
      width: 6px;
      height: 6px;
      flex: 0 0 auto;
      background: var(--red);
    }

    .signal.off {
      opacity: 0.25;
    }

    .content {
      display: grid;
      min-height: 0;
      grid-template-columns: minmax(0, 1fr) 165px;
    }

    .clock-area {
      display: flex;
      min-width: 0;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 10px;
    }

    .time {
      display: flex;
      align-items: center;
      gap: 10px;
      transform: skewX(-2deg);
    }

    .digit-group {
      display: flex;
      gap: 7px;
    }

    .digit {
      --width: 62px;
      --height: 108px;
      --thickness: 9px;

      position: relative;
      width: var(--width);
      height: var(--height);
      flex: 0 0 auto;
    }

    .segment {
      position: absolute;
      background: var(--segment-off);
    }

    .segment.active {
      background: var(--text);
    }

    .segment.horizontal {
      left: var(--thickness);
      width: calc(100% - var(--thickness) * 2);
      height: var(--thickness);
      clip-path: polygon(
        10% 0,
        90% 0,
        100% 50%,
        90% 100%,
        10% 100%,
        0 50%
      );
    }

    .segment.vertical {
      width: var(--thickness);
      height: 42%;
      clip-path: polygon(
        50% 0,
        100% 10%,
        100% 90%,
        50% 100%,
        0 90%,
        0 10%
      );
    }

    .a { top: 0; }
    .g { top: 50%; transform: translateY(-50%); }
    .d { bottom: 0; }
    .f { top: 6%; left: 0; }
    .b { top: 6%; right: 0; }
    .e { bottom: 6%; left: 0; }
    .c { right: 0; bottom: 6%; }

    .colon {
      display: flex;
      width: 12px;
      height: 58px;
      flex: 0 0 auto;
      flex-direction: column;
      justify-content: space-between;
      opacity: 1;
    }

    .colon.off {
      opacity: 0.18;
    }

    .colon span {
      width: 9px;
      height: 14px;
      background: var(--text);
      clip-path: polygon(25% 0, 100% 20%, 75% 100%, 0 80%);
    }

    .status-area {
      display: grid;
      min-width: 0;
      min-height: 0;
      grid-template-rows: 1fr 1fr;
      gap: 8px;
      padding: 10px;
      border-left: 1px solid var(--line);
    }

    .status-box {
      display: grid;
      min-width: 0;
      overflow: hidden;
      grid-template-columns: minmax(0, 1fr) 42px;
      border: 1px solid var(--red);
    }

    .status-copy {
      display: flex;
      min-width: 0;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
      padding-left: 9px;
      color: var(--red);
    }

    .status-copy strong {
      overflow: hidden;
      font-family: serif;
      font-size: 21px;
      line-height: 0.9;
      white-space: nowrap;
    }

    .status-copy span {
      margin-top: 4px;
      overflow: hidden;
      font-size: 9px;
      font-weight: 800;
      white-space: nowrap;
    }

    .stripes {
      border-left: 1px solid var(--red);
      background:
        repeating-linear-gradient(
          130deg,
          var(--red) 0,
          var(--red) 6px,
          transparent 6px,
          transparent 12px
        );
    }

    .status-box.external {
      border-color: var(--red-muted);
    }

    .status-box.external .status-copy {
      color: var(--red-muted);
    }

    .status-box.external .stripes {
      border-color: var(--red-muted);
      opacity: 0.35;
    }

    .footer {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid var(--line);
    }

    .mode {
      position: relative;
      display: flex;
      min-width: 0;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-right: 1px solid var(--line);
      color: var(--muted);
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .mode:last-child {
      border-right: 0;
    }

    .mode.active {
      padding-bottom: 7px;
      color: var(--text);
    }

    .mode.active::after {
      position: absolute;
      right: 28%;
      bottom: 3px;
      left: 28%;
      height: 4px;
      content: "";
      background: var(--red);
    }

    @media (max-width: 480px) {
      html,
      body {
        height: 164px;
      }

      .widget {
        height: 164px;
        grid-template-rows: 27px minmax(0, 1fr) 30px;
      }

      .content {
        grid-template-columns: minmax(0, 1fr) 132px;
      }

      .digit {
        --width: 43px;
        --height: 75px;
        --thickness: 7px;
      }

      .digit-group {
        gap: 5px;
      }

      .time {
        gap: 6px;
      }

      .colon {
        width: 8px;
        height: 42px;
      }

      .colon span {
        width: 6px;
        height: 10px;
      }

      .status-area {
        gap: 6px;
        padding: 7px;
      }

      .status-box {
        grid-template-columns: minmax(0, 1fr) 30px;
      }

      .status-copy {
        padding-left: 6px;
      }

      .status-copy strong {
        font-size: 17px;
      }

      .status-copy span {
        margin-top: 2px;
        font-size: 8px;
      }
    }

    @media (max-width: 350px) {
      html,
      body {
        height: 148px;
      }

      .widget {
        height: 148px;
        grid-template-rows: 25px minmax(0, 1fr) 28px;
      }

      .header {
        padding: 0 8px;
        font-size: 7px;
      }

      .header-left {
        gap: 5px;
      }

      .header-left > span:last-child {
        display: none;
      }

      .content {
        grid-template-columns: minmax(0, 1fr) 96px;
      }

      .clock-area {
        padding: 6px;
      }

      .digit {
        --width: 34px;
        --height: 62px;
        --thickness: 5px;
      }

      .digit-group {
        gap: 3px;
      }

      .time {
        gap: 5px;
      }

      .colon {
        width: 6px;
        height: 34px;
      }

      .colon span {
        width: 5px;
        height: 8px;
      }

      .status-area {
        gap: 5px;
        padding: 5px;
      }

      .status-box {
        grid-template-columns: minmax(0, 1fr) 20px;
      }

      .status-copy {
        padding-left: 5px;
      }

      .status-copy strong {
        font-size: 15px;
      }

      .status-copy span {
        font-size: 6px;
      }

      .mode {
        font-size: 7px;
      }
    }

    @media (max-width: 260px) and (min-width: 161px) {
      html,
      body {
        height: 128px;
      }

      .widget {
        height: 128px;
        grid-template-rows: 22px minmax(0, 1fr) 24px;
      }

      .header {
        padding: 0 6px;
        font-size: 6px;
      }

      .date-label {
        display: none;
      }

      .signal {
        width: 4px;
        height: 4px;
      }

      .content {
        grid-template-columns: minmax(0, 1fr) 76px;
      }

      .clock-area {
        padding: 3px;
      }

      .digit {
        --width: 26px;
        --height: 50px;
        --thickness: 4px;
      }

      .digit-group {
        gap: 2px;
      }

      .time {
        gap: 3px;
      }

      .colon {
        width: 5px;
        height: 28px;
      }

      .colon span {
        width: 4px;
        height: 6px;
      }

      .status-area {
        gap: 4px;
        padding: 4px;
      }

      .status-box {
        grid-template-columns: minmax(0, 1fr) 14px;
      }

      .status-copy {
        padding-left: 4px;
      }

      .status-copy strong {
        font-size: 12px;
      }

      .status-copy span {
        display: none;
      }

      .mode {
        font-size: 6px;
      }

      .mode.active {
        padding-bottom: 5px;
      }

      .mode.active::after {
        bottom: 2px;
        height: 3px;
      }
    }

    @media (max-width: 160px) {
      html,
      body {
        height: 80px;
      }

      .widget {
        display: flex;
        width: 100%;
        height: 80px;
        align-items: center;
        justify-content: center;
        border: 0;
      }

      .header,
      .status-area,
      .footer {
        display: none;
      }

      .content {
        display: block;
      }

      .clock-area {
        padding: 0;
      }

      .digit {
        --width: 24px;
        --height: 46px;
        --thickness: 4px;
      }

      .digit-group {
        gap: 3px;
      }

      .time {
        gap: 4px;
      }

      .colon {
        width: 5px;
        height: 27px;
      }

      .colon span {
        width: 4px;
        height: 6px;
      }
    }

    @media (max-width: 110px) {
      html,
      body,
      .widget {
        height: 60px;
      }

      .digit {
        --width: 17px;
        --height: 34px;
        --thickness: 3px;
      }

      .digit-group {
        gap: 2px;
      }

      .time {
        gap: 3px;
      }

      .colon {
        width: 4px;
        height: 20px;
      }

      .colon span {
        width: 3px;
        height: 5px;
      }
    }
  </style>
</head>

<body>
  <main class="widget" aria-label="대한민국 서울 현재 시각">
    <header class="header">
      <div class="header-left">
        <span class="signal"></span>
        <span>Active Time · Seoul</span>
      </div>

      <div class="header-right">
        <span class="date-label" id="dateLabel">0000.00.00</span>
        <span>Korea Standard Time</span>
      </div>
    </header>

    <section class="content">
      <div class="clock-area">
        <div class="time">
          <div class="digit-group">
            <div class="digit"></div>
            <div class="digit"></div>
          </div>

          <div class="colon" id="colon">
            <span></span>
            <span></span>
          </div>

          <div class="digit-group">
            <div class="digit"></div>
            <div class="digit"></div>
          </div>
        </div>
      </div>

      <aside class="status-area">
        <div class="status-box">
          <div class="status-copy">
            <strong>内部</strong>
            <span>INTERNAL</span>
          </div>

          <div class="stripes"></div>
        </div>

        <div class="status-box external">
          <div class="status-copy">
            <strong>外部</strong>
            <span>EXTERNAL</span>
          </div>

          <div class="stripes"></div>
        </div>
      </aside>
    </section>

    <footer class="footer">
      <span class="mode">Stop</span>
      <span class="mode">Slow</span>
      <span class="mode">Normal</span>
      <span class="mode active">Racing</span>
    </footer>
  </main>

  <script>
    const names = ["a", "b", "c", "d", "e", "f", "g"];
    const dateLabel = document.getElementById("dateLabel");
    const colon = document.getElementById("colon");
    const signal = document.querySelector(".signal");

    const digitSegments = {
      0: ["a", "b", "c", "d", "e", "f"],
      1: ["b", "c"],
      2: ["a", "b", "d", "e", "g"],
      3: ["a", "b", "c", "d", "g"],
      4: ["b", "c", "f", "g"],
      5: ["a", "c", "d", "f", "g"],
      6: ["a", "c", "d", "e", "f", "g"],
      7: ["a", "b", "c"],
      8: ["a", "b", "c", "d", "e", "f", "g"],
      9: ["a", "b", "c", "d", "f", "g"]
    };

    const digits = [...document.querySelectorAll(".digit")];

    digits.forEach(digit => {
      names.forEach(name => {
        const segment = document.createElement("span");
        const orientation = ["a", "d", "g"].includes(name)
          ? "horizontal"
          : "vertical";

        segment.className = `segment ${orientation} ${name}`;
        digit.appendChild(segment);
      });
    });

    const formatter = new Intl.DateTimeFormat("en-GB", {
      timeZone: "Asia/Seoul",
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      hourCycle: "h23"
    });

    function setDigit(element, value) {
      names.forEach(name => {
        element
          .querySelector(`.${name}`)
          .classList.toggle(
            "active",
            digitSegments[value].includes(name)
          );
      });
    }

    function updateClock() {
      const parts = Object.fromEntries(
        formatter
          .formatToParts(new Date())
          .filter(part => part.type !== "literal")
          .map(part => [part.type, part.value])
      );

      const time = `${parts.hour}${parts.minute}`;
      const blinkOff = Number(parts.second) % 2 === 1;

      digits.forEach((digit, index) => {
        setDigit(digit, time[index]);
      });

      colon.classList.toggle("off", blinkOff);
      signal.classList.toggle("off", blinkOff);
      dateLabel.textContent = `${parts.year}.${parts.month}.${parts.day}`;
    }

    updateClock();
    setInterval(updateClock, 250);
  </script>
</body>
</html>
