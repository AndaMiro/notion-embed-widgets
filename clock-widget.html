<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">

  <style>
    :root {
      color-scheme: light dark;
      --text: #37352f;
      --muted: #787774;
      --tile: rgba(55, 53, 47, 0.045);
      --border: rgba(55, 53, 47, 0.12);
      --track: rgba(55, 53, 47, 0.1);
      --progress: #37352f;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text: rgba(255, 255, 255, 0.9);
        --muted: rgba(255, 255, 255, 0.45);
        --tile: rgba(255, 255, 255, 0.055);
        --border: rgba(255, 255, 255, 0.12);
        --track: rgba(255, 255, 255, 0.1);
        --progress: rgba(255, 255, 255, 0.82);
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 210px;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont,
        "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .clock {
      display: flex;
      width: 100%;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .meta {
      display: flex;
      width: min(100%, 350px);
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .time {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .group {
      display: flex;
      gap: 6px;
    }

    .digit {
      display: flex;
      width: 64px;
      height: 82px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--tile);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 49px;
      font-weight: 500;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.025);
    }

    .separator {
      display: flex;
      height: 82px;
      flex-direction: column;
      justify-content: center;
      gap: 11px;
      padding: 0 3px;
    }

    .separator span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--muted);
    }

    .seconds {
      display: flex;
      width: min(100%, 350px);
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    .track {
      height: 2px;
      flex: 1;
      overflow: hidden;
      background: var(--track);
    }

    .progress {
      width: 0;
      height: 100%;
      background: var(--progress);
      transition: width 0.25s ease-out;
    }

    .second-value {
      width: 20px;
      color: var(--muted);
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 10px;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    @media (max-width: 430px) {
      html,
      body {
        height: 174px;
      }

      .clock {
        padding: 14px 10px;
      }

      .meta,
      .seconds {
        width: min(100%, 264px);
      }

      .time {
        gap: 5px;
      }

      .group {
        gap: 4px;
      }

      .digit {
        width: 48px;
        height: 64px;
        font-size: 37px;
      }

      .separator {
        height: 64px;
        gap: 9px;
        padding: 0 2px;
      }

      .separator span {
        width: 3px;
        height: 3px;
      }
    }
  </style>
</head>

<body>
  <main class="clock" aria-label="대한민국 서울 현재 시각">
    <div class="meta">
      <span>Seoul, Korea</span>
      <span id="date">0000. 00. 00</span>
    </div>

    <div class="time">
      <div class="group">
        <span class="digit" id="h1">0</span>
        <span class="digit" id="h2">0</span>
      </div>

      <div class="separator">
        <span></span>
        <span></span>
      </div>

      <div class="group">
        <span class="digit" id="m1">0</span>
        <span class="digit" id="m2">0</span>
      </div>
    </div>

    <div class="seconds">
      <div class="track">
        <div class="progress" id="progress"></div>
      </div>
      <span class="second-value" id="second">00</span>
    </div>
  </main>

  <script>
    const timeFormatter = new Intl.DateTimeFormat("en-GB", {
      timeZone: "Asia/Seoul",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      hourCycle: "h23"
    });

    const dateFormatter = new Intl.DateTimeFormat("ko-KR", {
      timeZone: "Asia/Seoul",
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      weekday: "short"
    });

    function updateClock() {
      const now = new Date();

      const parts = Object.fromEntries(
        timeFormatter
          .formatToParts(now)
          .filter(part => part.type !== "literal")
          .map(part => [part.type, part.value])
      );

      const hour = parts.hour;
      const minute = parts.minute;
      const second = Number(parts.second);

      document.getElementById("h1").textContent = hour[0];
      document.getElementById("h2").textContent = hour[1];
      document.getElementById("m1").textContent = minute[0];
      document.getElementById("m2").textContent = minute[1];
      document.getElementById("second").textContent =
        String(second).padStart(2, "0");

      document.getElementById("progress").style.width =
        `${((second + 1) / 60) * 100}%`;

      document.getElementById("date").textContent =
        dateFormatter.format(now).replaceAll(" ", " · ");
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
